<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hemant Kumar — Portfolio</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: 'JetBrains Mono', ui-monospace, monospace; background: #0a0a0a; color: #e6e6e6; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="v1-terminal.jsx"></script>
<script type="text/babel" src="v1-variants.jsx"></script>
<script type="text/babel" src="v2-ide.jsx"></script>
<script type="text/babel" src="v3-monitor.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="portfolios" title="Hemant Kumar — portfolio directions" subtitle="Three terminal-flavored takes. Click a card's expand icon to open fullscreen.">
        <DCArtboard id="v1" label="V1 · Terminal CLI (default)" width={1280} height={820}>
          <V1Terminal />
        </DCArtboard>
        <DCArtboard id="v1b" label="V1b · Matrix" width={1280} height={820}>
          <window.V1Matrix />
        </DCArtboard>
        <DCArtboard id="v1c" label="V1c · Amber CRT" width={1280} height={820}>
          <window.V1Amber />
        </DCArtboard>
        <DCArtboard id="v1d" label="V1d · Paper (light)" width={1280} height={820}>
          <window.V1Paper />
        </DCArtboard>
        <DCArtboard id="v2" label="V2 · IDE" width={1280} height={820}>
          <V2IDE />
        </DCArtboard>
        <DCArtboard id="v3" label="V3 · System monitor" width={1280} height={820}>
          <V3Monitor />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
